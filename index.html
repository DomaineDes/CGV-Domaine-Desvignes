<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domaine Desvignes – CGV / GTC</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --creme:  #F5EFE0;
    --beige:  #D9CEBC;
    --brun:   #80363A;
    --noir:   #1C1A17;
    --blanc:  #FAF7F2;
    --olive:  #928E3D;
    --muted:  #7a6a58;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
  }

  body {
    background: var(--blanc);
    color: var(--noir);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem 1.2rem;
  }

  /* ── CARD ── */
  .card {
    background: var(--blanc);
    max-width: 480px;
    width: 100%;
    text-align: center;
  }

  /* ── LOGO / NOM ── */
  .domain {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.4rem, 8vw, 3.8rem);
    font-weight: 300;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--brun);
    line-height: 1.1;
  }

  .domain em {
    font-style: italic;
    font-weight: 400;
    color: var(--olive);
  }

  .tagline {
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 0.5rem;
  }

  /* ── SÉPARATEUR ── */
  .rule {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin: 2rem 0;
  }

  .rule::before, .rule::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--beige);
  }

  .rule-diamond {
    width: 6px;
    height: 6px;
    background: var(--beige);
    transform: rotate(45deg);
    flex-shrink: 0;
  }

  /* ── TITRE DOCUMENT ── */
  .doc-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.85rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1.8rem;
  }

  /* ── BOUTONS LANGUE ── */
  .lang-buttons {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .lang-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    text-decoration: none;
    padding: 1.2rem 1.6rem;
    border: 1px solid var(--beige);
    background: var(--creme);
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
  }

  .lang-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--brun);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.28s ease;
    z-index: 0;
  }

  .lang-btn:hover::before { transform: scaleX(1); }

  .lang-btn:hover .btn-flag,
  .lang-btn:hover .btn-title,
  .lang-btn:hover .btn-sub,
  .lang-btn:hover .btn-arrow { color: var(--blanc); }

  .lang-btn:hover { border-color: var(--brun); }

  .btn-left {
    display: flex;
    align-items: center;
    gap: 1rem;
    position: relative;
    z-index: 1;
  }

  .btn-flag {
    font-size: 1.8rem;
    line-height: 1;
    transition: color 0.25s;
  }

  .btn-text { text-align: left; }

  .btn-title {
    display: block;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--brun);
    letter-spacing: 0.04em;
    transition: color 0.25s;
  }

  .btn-sub {
    display: block;
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 0.15rem;
    transition: color 0.25s;
  }

  .btn-arrow {
    font-size: 1.1rem;
    color: var(--beige);
    position: relative;
    z-index: 1;
    transition: color 0.25s, transform 0.25s;
  }

  .lang-btn:hover .btn-arrow { transform: translateX(4px); }

  /* ── FOOTER ── */
  .footer {
    margin-top: 2.8rem;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    color: var(--beige);
    text-transform: uppercase;
  }

  @media (max-width: 400px) {
    .btn-flag { font-size: 1.4rem; }
    .btn-title { font-size: 1rem; }
  }
</style>
</head>
<body>

<div class="card">

  <div class="domain">Domaine <em>Desvignes</em></div>
  <p class="tagline">Earl &nbsp;·&nbsp; Producteur de vins</p>

  <div class="rule"><div class="rule-diamond"></div></div>

  <p class="doc-label">Conditions Générales de Vente &nbsp;/&nbsp; General Terms of Sale</p>

  <div class="lang-buttons">

    <a href="cgv-domaine-desvignes.html" class="lang-btn">
      <div class="btn-left">
        <span class="btn-flag">🇫🇷</span>
        <div class="btn-text">
          <span class="btn-title">Version française</span>
          <span class="btn-sub">Conditions Générales de Vente</span>
        </div>
      </div>
      <span class="btn-arrow">→</span>
    </a>

    <a href="gtcs-domaine-desvignes.html" class="lang-btn">
      <div class="btn-left">
        <span class="btn-flag">🇬🇧</span>
        <div class="btn-text">
          <span class="btn-title">English version</span>
          <span class="btn-sub">General Terms and Conditions of Sale</span>
        </div>
      </div>
      <span class="btn-arrow">→</span>
    </a>

  </div>

  <p class="footer">EARL Domaine Desvignes &nbsp;·&nbsp; 2025</p>

</div>

</body>
</html>
